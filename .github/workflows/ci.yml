name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify .next is not committed
        run: |
          if git ls-files --error-unmatch .next 2>/dev/null; then
            echo "ERROR: .next/ directory is committed to the repo. Add it to .gitignore."
            exit 1
          fi
          echo "OK: .next/ is not committed."
